<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact - Noor Ali</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

<body>


<header>

    <h1>Contact Me</h1>


    <nav>

        <a href="index.html">Home</a>

        <a href="about.html">About Me</a>

        <a href="projects.html">Projects</a>

        <a href="contact.html" class="active">Contact</a>

    </nav>


</header>




<main>


<section class="contact-section">


    <h2>Get In Touch</h2>


    <p>
        If you have any questions, project opportunities, or would like
        to connect, feel free to send me a message using the form below.
    </p>



    <form action="mailto:nali14@oldwestbury.edu"
          method="post"
          enctype="text/plain">



        <label for="name">
            Name:
        </label>


        <input type="text"
               id="name"
               name="name"
               required>




        <label for="email">
            Email:
        </label>


        <input type="email"
               id="email"
               name="email"
               required>




        <label for="subject">
            Subject:
        </label>


        <input type="text"
               id="subject"
               name="subject"
               required>




        <label for="message">
            Message:
        </label>


        <textarea id="message"
                  name="message"
                  rows="6"
                  required></textarea>




        <button type="submit">
            Submit
        </button>


    </form>


</section>


</main>




<footer>

    <p>
        &copy; 2026 Noor Ali
    </p>

</footer>



</body>

</html>
