<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Noor Ali</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="section">
        <h2>Contact Me</h2>
        <p>Send me a message below!</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" required placeholder="Your full name">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required placeholder="your.email@example.com">
            </div>

            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" rows="5" required placeholder="Write your message here..."></textarea>
            </div>

            <button type="submit" class="btn">Send Message</button>
        </form>

        <!-- Dynamic message displayed after form submit -->
        <p id="formStatus" class="status-message"></p>
    </section>

    <footer>
        <p>&copy; 2026 Noor Ali</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
