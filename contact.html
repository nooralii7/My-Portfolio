<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Noor Ali</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Noor Ali</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="section">
        <h2>Contact Me</h2>
        <p>Interested in working together or asking a question? Fill out the form below!</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" required placeholder="e.g. Jane Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="e.g. jane@example.com">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="5" required placeholder="Type your message here..."></textarea>
            </div>

            <button type="submit" class="btn">Send Message</button>
        </form>

        <!-- Container where JS renders feedback message -->
        <div id="formStatus" class="status-message"></div>
    </section>

    <footer>
        <p>&copy; 2026 Noor Ali. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
