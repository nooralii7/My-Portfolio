<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Noor Ali</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<header>
    <h1>Contact Me</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
</header>

<div class="top-controls">
    <button id="themeToggle" class="theme-btn">Dark Mode</button>
</div>
<main>
<section>
    <h2>Contact Form</h2>
    <form id="contactForm" action="mailto:noorali@gmail.com" method="post" enctype="text/plain" novalidate>

        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <span class="error-msg" id="nameError"></span>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <span class="error-msg" id="emailError"></span>

        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject">
        <span class="error-msg" id="subjectError"></span>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="6"></textarea>
        <span class="error-msg" id="messageError"></span>
        <input type="submit" id="submitBtn" value="Submit">
    </form>
    <div id="formSuccess" class="success-message"></div>
</section>
</main>

<div class="clock-container">
    <span id="liveClock">Loading current time...</span>
</div>

<footer>
    <p>
        &copy; 2026 Noor Ali | Contact: <a href="mailto:noora5272@gmail.com">noorali@gmail.com</a>
    </p>
</footer>

<button id="backToTop" class="back-to-top" title="Back to Top">↑</button>

<script src="script.js"></script>
</body>
</html>
