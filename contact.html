<main>

<section>

    <h2>Contact Form</h2>

    <form action="mailto:noorali@gmail.com" method="post" enctype="text/plain">

        <label for="name">Name:</label>
        <input type="text" 
               id="name" 
               name="name"
               required>


        <label for="email">Email:</label>
        <input type="email" 
               id="email" 
               name="email"
               required>


        <label for="subject">Subject:</label>
        <input type="text" 
               id="subject" 
               name="subject"
               required>


        <label for="message">Message:</label>
        <textarea id="message"
                  name="message"
                  rows="6"
                  required></textarea>


        <input type="submit" value="Submit">

    </form>

</section>
